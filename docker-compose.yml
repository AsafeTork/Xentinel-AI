services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: ["gunicorn", "-w", "2", "-k", "gthread", "--threads", "8", "-b", "0.0.0.0:8000", "app:app"]

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["python", "-m", "nexus.worker"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: nexus
    volumes:
      - nexus_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  nexus_pg:
