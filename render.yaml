services:
  - type: web
    name: nexus-auditor-web
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LLM_BASE_URL_V1
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_DEFAULT_MODEL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_GITHUB_CLIENT_ID
        sync: false
      - key: OAUTH_GITHUB_CLIENT_SECRET
        sync: false
      - key: AUDIT_BRIEF
        sync: false
      - key: AUDIT_REFLECT
        sync: false
      - key: AUDIT_ATTACK_TOTAL_MODE
        sync: false
      - key: AUDIT_MAX_CONSECUTIVE_LLM_FAILURES
        sync: false
      - key: AUDIT_MARKET_RESEARCH
        sync: false
      - key: CATCHALL_API_KEY
        sync: false
      - key: AUDIT_MARKET_DAYS
        sync: false
      - key: AUDIT_MARKET_MODE
        sync: false
      - key: AUDIT_MARKET_LIMIT
        sync: false
      - key: AUDIT_MARKET_POLL_MAX_S
        sync: false
      - key: AUDIT_MARKET_POLL_INTERVAL_S
        sync: false
      - key: AUDIT_MARKET_CACHE_TTL_S
        sync: false
      - key: AUDIT_MARKET_QUERY
        sync: false
      - key: AUDIT_MARKET_CONTEXT
        sync: false
      - key: LLM_MODELS_CACHE_TTL_S
        sync: false
      - key: LLM_MODELS_ALLOWLIST
        sync: false
      - key: DASH_CACHE_TTL_S
        sync: false
      - key: ADMIN_GLOBAL_USERS
        sync: false
      - key: MONITOR_TICK_TOKEN
        sync: false
      - key: DECISION_TOP_N
        sync: false
      - key: MONITOR_DECISION_LOOKBACK
        sync: false
      - key: LEARNING_ENABLED
        sync: false
      - key: POLICY_DEFAULT_MAX_RISK_LEVEL
        sync: false
      - key: POLICY_DEFAULT_MAX_RATE_RPS
        sync: false
      - key: CONTEXT_LOOKBACK
        sync: false
      - key: APP_NAME
        sync: false
      - key: BASE_URL
        sync: false
    startCommand: bash bin/start_web.sh

  - type: worker
    name: nexus-auditor-worker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LLM_BASE_URL_V1
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_DEFAULT_MODEL
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_GITHUB_CLIENT_ID
        sync: false
      - key: OAUTH_GITHUB_CLIENT_SECRET
        sync: false
      - key: AUDIT_BRIEF
        sync: false
      - key: AUDIT_REFLECT
        sync: false
      - key: AUDIT_ATTACK_TOTAL_MODE
        sync: false
      - key: AUDIT_MAX_CONSECUTIVE_LLM_FAILURES
        sync: false
      - key: AUDIT_MARKET_RESEARCH
        sync: false
      - key: CATCHALL_API_KEY
        sync: false
      - key: AUDIT_MARKET_DAYS
        sync: false
      - key: AUDIT_MARKET_MODE
        sync: false
      - key: AUDIT_MARKET_LIMIT
        sync: false
      - key: AUDIT_MARKET_POLL_MAX_S
        sync: false
      - key: AUDIT_MARKET_POLL_INTERVAL_S
        sync: false
      - key: AUDIT_MARKET_CACHE_TTL_S
        sync: false
      - key: AUDIT_MARKET_QUERY
        sync: false
      - key: AUDIT_MARKET_CONTEXT
        sync: false
      - key: LLM_MODELS_CACHE_TTL_S
        sync: false
      - key: LLM_MODELS_ALLOWLIST
        sync: false
      - key: DASH_CACHE_TTL_S
        sync: false
      - key: ADMIN_GLOBAL_USERS
        sync: false
      - key: MONITOR_TICK_TOKEN
        sync: false
      - key: DECISION_TOP_N
        sync: false
      - key: MONITOR_DECISION_LOOKBACK
        sync: false
      - key: LEARNING_ENABLED
        sync: false
      - key: POLICY_DEFAULT_MAX_RISK_LEVEL
        sync: false
      - key: POLICY_DEFAULT_MAX_RATE_RPS
        sync: false
      - key: CONTEXT_LOOKBACK
        sync: false
      - key: APP_NAME
        sync: false
      - key: BASE_URL
        sync: false
    startCommand: python -m nexus.worker
