{% extends "layout.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md card">
    <div class="flex items-center justify-between gap-4">
      <img class="h-10 w-10 object-contain" alt="Logo" src="{{ url_for('static', filename='logo_mark.png') }}"/>
      <div class="text-right">
        <div class="page-title tracking-tight">Create account</div>
        <div class="body-text">Start in under a minute</div>
      </div>
    </div>

    <form class="mt-6 flex flex-col gap-4" method="post" action="{{ url_for('auth.register_post') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label for="org_name" class="body-text">Organization</label>
        <input id="org_name" aria-label="Organization" name="org_name" class="input mt-4 text-sm" />
      </div>
      <div>
        <label for="email" class="body-text">Email</label>
        <input id="email" aria-label="Email" name="email" autocomplete="email" class="input mt-4 text-sm" />
      </div>
      <div>
        <label for="password" class="body-text">Password</label>
        <input id="password" aria-label="Password" aria-describedby="pwdHelp" type="password" name="password" autocomplete="new-password" class="input mt-4 text-sm" />
        <div id="pwdHelp" class="mt-4 body-text">Minimum 8 characters.</div>
      </div>
      <button class="btn-primary w-full">Create</button>
    </form>

    <div class="mt-6 body-text">
      Already have an account?
      <a class="text-brand-2 underline" href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
