{% set ep = (request.endpoint or '') %}
<nav class="flex flex-col gap-2">
  <div class="nav-label">Workspace</div>
  <a class="nav-link {% if ep.startswith('dashboard.') %}nav-link-active{% endif %}"
     {% if ep.startswith('dashboard.') %}aria-current="page"{% endif %}
     href="{{ url_for('dashboard.home') }}">
    <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h8V3H3v10Zm10 8h8V11h-8v10ZM3 21h8v-6H3v6Zm10-12h8V3h-8v6Z"/></svg>
    <span>Dashboard</span>
  </a>

  <a class="nav-link {% if ep == 'dashboard.priorities' %}nav-link-active{% endif %}"
     {% if ep == 'dashboard.priorities' %}aria-current="page"{% endif %}
     href="{{ url_for('dashboard.priorities') }}">
    <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
    <span>Prioridades</span>
  </a>

  <a class="nav-link {% if ep.startswith('settings.') %}nav-link-active{% endif %}"
     {% if ep.startswith('settings.') %}aria-current="page"{% endif %}
     href="{{ url_for('settings.settings_home') }}">
    <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Zm7.4-2.5a7.9 7.9 0 0 0 0-2l2-1.5-2-3.5-2.4 1a8 8 0 0 0-1.7-1l-.4-2.6H10l-.4 2.6c-.6.3-1.2.6-1.7 1l-2.4-1-2 3.5 2 1.5a7.9 7.9 0 0 0 0 2l-2 1.5 2 3.5 2.4-1c.5.4 1.1.7 1.7 1l.4 2.6h4.2l.4-2.6c.6-.3 1.2-.6 1.7-1l2.4 1 2-3.5-2-1.5Z"/></svg>
    <span>Settings</span>
  </a>

  {% if current_user.is_admin %}
    <div class="nav-section">
      <div class="nav-label">Admin</div>
      <a class="nav-link {% if ep.startswith('admin.admin_home') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.admin_home') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.admin_home') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M9 8h6M7 4h10a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2Z"/></svg>
        <span>Console</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.admin_overview') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.admin_overview') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.admin_overview') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 19V5m0 14h16M8 17V9m4 8V7m4 10v-6"/></svg>
        <span>Overview</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.admin_agent') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.admin_agent') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.admin_agent') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        <span>Agent</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.ui_lab') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.ui_lab') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.ui_lab') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a4 4 0 0 0-4 4v1H7a3 3 0 0 0-3 3v3h2v-3a1 1 0 0 1 1-1h1v2a4 4 0 0 0 8 0V9h1a1 1 0 0 1 1 1v3h2v-3a3 3 0 0 0-3-3h-1V6a4 4 0 0 0-4-4Zm-2 7V6a2 2 0 1 1 4 0v3a2 2 0 1 1-4 0Z"/></svg>
        <span>UI Lab</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.backend_lab') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.backend_lab') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.backend_lab') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h16"/></svg>
        <span>Backend Lab</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.admin_logs') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.admin_logs') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.admin_logs') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h16v16H4V4Zm4 12h8M8 8h8M8 12h6"/></svg>
        <span>Logs</span>
      </a>

      <a class="nav-link {% if ep.startswith('admin.admin_users') %}nav-link-active{% endif %}"
         {% if ep.startswith('admin.admin_users') %}aria-current="page"{% endif %}
         href="{{ url_for('admin.admin_users') }}">
        <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 14a4 4 0 1 1-8 0 4 4 0 0 1 8 0Zm-14 8a6 6 0 0 1 20 0M20 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
        <span>Users</span>
      </a>

      {% if has_monitoring %}
        <a class="nav-link {% if ep.startswith('monitor.') %}nav-link-active{% endif %}"
           {% if ep.startswith('monitor.') %}aria-current="page"{% endif %}
           href="{{ url_for('monitor.monitoring_home') }}">
          <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12h3l3 8 4-16 3 8h5"/></svg>
          <span>Monitoring</span>
        </a>
      {% endif %}
    </div>
  {% endif %}

  <div class="nav-section">
    <div class="nav-label">Account</div>
    <a class="nav-link" href="{{ url_for('auth.logout') }}">
      <svg class="opacity-90" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 17l5-5-5-5M15 12H3m12 9a9 9 0 1 0 0-18"/></svg>
      <span>Logout</span>
    </a>
  </div>
</nav>
